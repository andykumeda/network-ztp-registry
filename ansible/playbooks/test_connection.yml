---
- name: Test network device reachability
  hosts: all
  gather_facts: false
  tasks:
    - name: Run show version
      ansible.netcommon.cli_command:
        command: show version
      register: show_version

    - name: Display first output lines
      ansible.builtin.debug:
        msg: "{{ show_version.stdout_lines[:5] | default([]) }}"
