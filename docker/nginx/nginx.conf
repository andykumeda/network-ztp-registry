server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # ztp.py — generated at container startup with correct server IP/port substituted
    location = /ztp.py {
        alias /var/cache/ztp/ztp.py;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # ZTP configuration (fetched by ztp.py on the switch)
    location = /config.json {
        add_header Content-Type "application/json";
    }

    # IOS images — large binary files served for switch upgrades
    location ~* \.bin$ {
        add_header Content-Type application/octet-stream;
        # Large file support; switches download images over HTTP
        sendfile on;
        tcp_nopush on;
    }

    # Deny everything else — this server only exists to support ZTP
    location / {
        return 404;
    }
}
