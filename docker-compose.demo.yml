services:
  registry:
    build:
      context: .
      dockerfile: docker/registry/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ztp-demo-data:/data
      - ./model-sn.csv:/app/model-sn.csv:ro
      - ./model-loc.csv:/app/model-loc.csv:ro
      - ./ansible:/opt/ansible:ro
    environment:
      - DB_PATH=/data/devices.db
      - POLLER_STATE_PATH=/data/.poller_state.json
      - LOOKUP_CSV_PATH=/app/model-sn.csv
      - SLOT_LOC_CSV_PATH=/app/model-loc.csv
      - ITSM_ENABLED=false

volumes:
  ztp-demo-data:
